name: Vercel Cron Trigger

on:
  schedule:
    # Run every 5 minutes (GitHub Actions minimum interval)
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel API every minute
        run: |
          for i in {1..5}; do
            curl -s https://pipeline-three-flame.vercel.app/api/cron
            if [ $i -lt 5 ]; then sleep 60; fi
          done
